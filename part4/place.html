<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HBnB - Place Details</title>
  <link rel="icon" href="images/icon.png">
  <link rel="stylesheet" href="css/styles.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body>

  <!-- HEADER -->
  <header>
    <div class="header-container">
      <img src="images/logo.png" alt="HBnB Logo" class="logo">
      <a href="login.html" class="login-button" id="login-link">Login</a>
    </div>
  </header>

  <!-- MAIN -->
  <main class="container">

    <!-- PLACE DETAILS -->
    <section id="place-details"></section>

    <!-- ADD REVIEW -->
    <section id="add-review-section" class="add-review-section card" style="display: none;">
      <h2>Add a Review</h2>

      <form id="review-form">

        <!-- hidden place id -->
        <input type="hidden" id="place-id">

        <div class="star-rating">
          <label>Rating:</label>
          <div class="stars" id="star-widget">
            <span class="star active" data-value="1">★</span>
            <span class="star active" data-value="2">★</span>
            <span class="star active" data-value="3">★</span>
            <span class="star active" data-value="4">★</span>
            <span class="star active" data-value="5">★</span>
          </div>
          <input type="hidden" id="rating" value="5" required>
        </div>

        <div class="review-input-row">
          <input type="text" id="review-text" class="review-bar" placeholder="Write a comment about this place..." autocomplete="off" required>
          <button type="submit" class="submit-button review-btn">Post</button>
        </div>
      </form>
    </section>

    <!-- REVIEWS -->
    <section class="reviews-section">
      <h2>Reviews</h2>
      <div id="reviews-list"></div>
    </section>

  </main>

  <!-- FOOTER -->
  <footer>
    <p>© 2026 HBnB Evolution. All rights reserved.</p>
  </footer>

  <!-- SCRIPTS -->
  <script src="js/scripts.js"></script>

</body>
</html>
