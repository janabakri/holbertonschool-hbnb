<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HBnB - Available Places</title> 

  <!-- ICON -->
  <link rel="icon" href="images/icon.png">

  <!-- CSS -->
  <link rel="stylesheet" href="css/styles.css">
</head>

<body>

  <header>
    <div class="header-content">

      <!-- LOGO -->
      <img src="images/logo.png" alt="HBnB Logo" class="logo">

      <a href="login.html" class="login-button" id="login-link">Login</a>

    </div>
  </header>

  <main>

    <section class="hero">
      <h1>Available Places</h1>

      <div class="filter-section card">
        <label for="price-filter">Max Price:</label>
        <select id="price-filter">
          <option value="all">All</option>
          <option value="10">10$</option>
          <option value="50">50$</option>
          <option value="100">100$</option>
        </select>
      </div>
    </section>

    <section id="places-list" class="places-grid">
      <!-- places will be loaded -->
    </section>

  </main>

  <footer>
    <p>© 2026 HBnB Evolution. All rights reserved.</p>
  </footer>

  <!-- JS -->
  <script src="js/utils.js"></script>
  <script src="js/scripts.js"></script>

</body>
</html>
